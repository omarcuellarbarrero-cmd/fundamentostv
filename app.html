<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Técnico - Consulta</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <div class="header-content">
        <div class="header-left">
            <img src="assets/logo-oc.webp" alt="Logo" class="logo-header">
            <h1>🔧 Fundamentación Técnica - Asistente Técnico</h1>
        </div>
        <button id="logoutBtn" class="btn-logout">🚪 Salir</button>
    </div>
</header>
    
    <main class="container">
        <!-- Selección de tipo de TV -->
        <section class="tv-selection">
            <h2>Seleccione el tipo de TV:</h2>
            <div class="tv-buttons">
                <button class="tv-btn" data-type="TRC">
                    <span class="icon">📺</span>
                    <span class="label">TV TRC</span>
                    <span class="desc">(Tubo de rayos catódicos)</span>
                </button>
                <button class="tv-btn" data-type="LCD">
                    <span class="icon">🖥️</span>
                    <span class="label">TV LCD/LED</span>
                    <span class="desc">(Pantalla plana)</span>
                </button>
            </div>
        </section>
        
        <!-- Búsqueda -->
        <section class="search-section">
            <div class="search-box">
                <label for="searchInput">¿Qué necesita saber?</label>
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Ej: fuente de alimentación, vertical, horizontal..."
                    autocomplete="off"
                >
                <button id="searchBtn" class="btn-primary">🔍 Buscar Información</button>
            </div>
        </section>
        
        <!-- Resultados -->
<section id="resultsSection" class="results-section hidden">
    <div class="results-header">
        <h3>Respuesta:</h3>
        <button id="listenBtn" class="btn-secondary" title="Escuchar respuesta">
            🔊 Escuchar
        </button>
    </div>
    
    
    <div id="resultsContent" class="results-content"></div>
</section>
        <!-- Loading -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>Buscando información...</p>
        </div>
    </main>
    
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
