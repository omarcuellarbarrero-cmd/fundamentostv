<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Técnico - Ingreso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="logo-container">
                <img src="Logo-nuevo-metodo-oc.webp" alt="Logo Omar Cuellar" class="logo-main">
            </div>
            <h1>🔧 Asistente Técnico</h1>
            <p class="subtitle">Para reparadores de TVs TRC y LCD/LED</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            
            <p class="help-text">¿Olvidó su contraseña? Contacte al administrador</p>
        </div>
    </div>
    
    <script src="login.js"></script>
</body>
</html>
