<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente Técnico - Ingreso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
                <!-- 👇 NUEVO: Logo principal -->
    <div class="logo-container">
        <img src="assets/logo-oc.webp" alt="Logo Omar Cuellar" class="logo-main">
    </div>
            <h1>🔧 Asistente Técnico</h1>
            <p class="subtitle">Para reparadores de TVs TRC y LCD/LED</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Usuario:</label>
                    <input type="text" id="username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña:</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn-primary">Ingresar</button>
            </form>
            
            <p class="help-text">¿Olvidó su contraseña? Contacte al administrador</p>
        </div>
    </div>
    
    <script src="config.js"></script>
    <script>
        // Usuarios de ejemplo (en producción, usar backend)
        const usuarios = {
            'tecnico1': 'clave123',
            'reparador': 'tv2024',
            'admin': 'admin2026'
        };
        
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (usuarios[user] && usuarios[user] === pass) {
                localStorage.setItem('usuario', user);
                window.location.href = 'app.html';
            } else {
                alert('Usuario o contraseña incorrectos');
            }
        });
        
        // Si ya está logueado, redirigir
        if (localStorage.getItem('usuario')) {
            window.location.href = 'app.html';
        }
    </script>
</body>
</html>
